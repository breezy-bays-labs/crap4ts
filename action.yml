name: 'crap4ts'
description: 'CRAP score analysis for TypeScript — find complex, under-tested functions'
author: 'Breezy Bays Labs'

branding:
  icon: 'activity'
  color: 'orange'

inputs:
  threshold:
    description: 'CRAP score threshold (default: 16, use 30 for lenient adoption)'
    required: false
    default: '16'
  coverage-path:
    description: 'Path to coverage JSON. Omit to let CLI auto-discover.'
    required: false
    default: ''
  src:
    description: 'Source directories (space-separated; paths containing spaces are not supported). Omit to let CLI auto-discover.'
    required: false
    default: ''
  changed-only:
    description: 'Only analyze functions changed in this PR'
    required: false
    default: 'true'
  post-comment:
    description: 'Post/update PR comment with results'
    required: false
    default: 'true'
  upload-artifact:
    description: 'Upload JSON report as workflow artifact'
    required: false
    default: 'true'
  version:
    description: 'crap4ts version to install via npx'
    required: false
    default: 'latest'
  working-directory:
    description: 'Directory to run analysis from'
    required: false
    default: '.'
  coverage-metric:
    description: 'Coverage metric: line or branch'
    required: false
    default: ''
  local:
    description: 'Use local dist/cli.js instead of npx (for local smoke testing)'
    required: false
    default: 'false'

outputs:
  passed:
    description: 'Whether all functions passed threshold'
    value: ${{ steps.analyze.outputs.passed }}
  total:
    description: 'Total functions analyzed'
    value: ${{ steps.analyze.outputs.total }}
  exceeding:
    description: 'Count of functions exceeding threshold'
    value: ${{ steps.analyze.outputs.exceeding }}
  exit-code:
    description: 'Raw exit code (0=pass, 1=threshold, 2=config, 3=parse)'
    value: ${{ steps.analyze.outputs.exit_code }}

runs:
  using: 'composite'
  steps:
    - name: Run CRAP analysis
      id: analyze
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_LOCAL: ${{ inputs.local }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
        INPUT_COVERAGE_PATH: ${{ inputs.coverage-path }}
        INPUT_SRC: ${{ inputs.src }}
        INPUT_COVERAGE_METRIC: ${{ inputs.coverage-metric }}
        INPUT_CHANGED_ONLY: ${{ inputs.changed-only }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        POST_COMMENT: ${{ inputs.post-comment }}
        IS_PR: ${{ github.event_name == 'pull_request' }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # Shared runner — only the --format flag differs between runs
        run_crap4ts() {
          local format="$1"
          local -a cmd

          case "$format" in
            json|markdown|table) ;;
            *)
              echo "::error::Invalid crap4ts format: ${format}"
              return 2
              ;;
          esac

          if ! node -e 'const value = Number(process.argv[1]); if (!Number.isFinite(value) || value <= 0) process.exit(1)' "$INPUT_THRESHOLD"; then
            echo "::error::Invalid threshold input: ${INPUT_THRESHOLD}"
            return 2
          fi

          if [ "$INPUT_LOCAL" = "true" ]; then
            cmd=(node dist/cli.js)
          else
            cmd=(npx "crap4ts@${INPUT_VERSION}")
          fi

          cmd+=(--format "$format" --threshold "$INPUT_THRESHOLD")
          [ -n "$INPUT_COVERAGE_PATH" ] && cmd+=(--coverage "$INPUT_COVERAGE_PATH")
          if [ -n "$INPUT_SRC" ]; then
            read -r -a src_parts <<< "$INPUT_SRC"
            cmd+=(--src "${src_parts[@]}")
          fi
          [ -n "$INPUT_COVERAGE_METRIC" ] && cmd+=(--coverage-metric "$INPUT_COVERAGE_METRIC")
          if [ "$INPUT_CHANGED_ONLY" = "true" ] && [ -n "$PR_BASE_SHA" ]; then
            cmd+=(--changed-since "$PR_BASE_SHA")
          fi

          printf "Running:"
          printf " %q" "${cmd[@]}"
          echo
          "${cmd[@]}"
        }

        # 1. JSON analysis — always runs
        set +e
        run_crap4ts json > crap4ts-report.json
        EXIT_CODE=$?
        set -e

        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

        # For config/parse errors, dump the output and fail immediately
        if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 1 ]; then
          echo "::error::crap4ts failed with exit code $EXIT_CODE"
          cat crap4ts-report.json
          exit $EXIT_CODE
        fi

        # 2. Parse outputs from JSON report
        echo "passed=$(jq -r '.passed' crap4ts-report.json)" >> "$GITHUB_OUTPUT"
        echo "total=$(jq -r '.summary.totalFunctions' crap4ts-report.json)" >> "$GITHUB_OUTPUT"
        echo "exceeding=$(jq -r '.summary.exceedingThreshold' crap4ts-report.json)" >> "$GITHUB_OUTPUT"

        # 3. Markdown analysis — only for PR comments
        if [ "$POST_COMMENT" = "true" ] && [ "$IS_PR" = "true" ]; then
          set +e
          run_crap4ts markdown > crap4ts-comment-body.md
          MARKDOWN_EXIT_CODE=$?
          set -e

          if [ $MARKDOWN_EXIT_CODE -ne 0 ] && [ $MARKDOWN_EXIT_CODE -ne 1 ]; then
            echo "::error::crap4ts markdown report failed with exit code $MARKDOWN_EXIT_CODE"
            cat crap4ts-comment-body.md
            exit $MARKDOWN_EXIT_CODE
          fi

          if [ ! -s crap4ts-comment-body.md ]; then
            echo "::error::crap4ts markdown report produced no output"
            exit 3
          fi

          # Determine analysis mode for footer
          if [ "$INPUT_CHANGED_ONLY" = "true" ] && [ -n "$PR_BASE_SHA" ]; then
            MODE="Changed functions only"
          else
            MODE="Full analysis"
          fi

          {
            echo "<!-- crap4ts-report -->"
            cat crap4ts-comment-body.md
            echo ""
            echo "---"
            echo "*Threshold: ${INPUT_THRESHOLD} · ${MODE} · [Workflow run](${RUN_URL})*"
          } > crap4ts-comment.md
        fi

    - name: Post PR comment
      if: |
        inputs.post-comment == 'true' &&
        github.event_name == 'pull_request' &&
        (steps.analyze.outputs.exit_code == '0' || steps.analyze.outputs.exit_code == '1')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        MARKER="<!-- crap4ts-report -->"
        COMMENT_BODY=$(cat "${WORKING_DIR}/crap4ts-comment.md")

        # Find existing comment with marker
        COMMENT_ID=$(gh api \
          "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --paginate \
          --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
          | head -1)

        if [ -n "$COMMENT_ID" ]; then
          gh api \
            "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            --method PATCH \
            --field body="$COMMENT_BODY"
          echo "Updated existing comment $COMMENT_ID"
        else
          gh api \
            "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --method POST \
            --field body="$COMMENT_BODY"
          echo "Created new comment"
        fi

    - name: Upload CRAP report
      if: inputs.upload-artifact == 'true' && (steps.analyze.outputs.exit_code == '0' || steps.analyze.outputs.exit_code == '1')
      uses: actions/upload-artifact@v4
      with:
        name: crap4ts-report
        path: ${{ inputs.working-directory }}/crap4ts-report.json
        retention-days: 30

    - name: Check threshold result
      if: steps.analyze.outputs.exit_code == '1'
      shell: bash
      env:
        EXCEEDING: ${{ steps.analyze.outputs.exceeding }}
      run: |
        echo "::error::CRAP analysis found ${EXCEEDING} function(s) exceeding threshold"
        exit 1
